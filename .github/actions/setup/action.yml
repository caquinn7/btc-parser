name: Setup runtimes
description: Sets up Node, Deno, Bun (conditionally), and BEAM toolchain

inputs:
  js_runtime:
    description: JavaScript runtime to set up (node, deno, bun, or empty for Erlang-only)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Node
      if: inputs.js_runtime == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: "25.9.0"

    - name: Setup Deno
      if: inputs.js_runtime == 'deno'
      uses: denoland/setup-deno@v2
      with:
        deno-version: "2.7.14"

    - name: Setup Bun
      if: inputs.js_runtime == 'bun'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.13"

    - name: Setup BEAM
      uses: erlef/setup-beam@v1
      with:
        otp-version: "28.5"
        gleam-version: "1.16.0"
        rebar3-version: "3.27.0"
        version-type: strict
