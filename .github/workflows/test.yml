name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: erlang
          - target: javascript
            js_runtime: node
          - target: javascript
            js_runtime: deno
          - target: javascript
            js_runtime: bun

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.js_runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"

      - name: Setup Deno
        if: matrix.js_runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.14"

      - name: Setup Bun
        if: matrix.js_runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.5"
          gleam-version: "1.16.0"
          rebar3-version: "3.27.0"
          version-type: strict

      - name: Run tests
        run: |
          gleam deps download
          if [ "${{ matrix.target }}" = "javascript" ]; then
            gleam test --target javascript --runtime ${{ matrix.js_runtime }}
          else
            gleam test --target erlang
          fi
          gleam format --check src test
