name: fuzz

on:
  pull_request:

jobs:
  seed:
    runs-on: ubuntu-latest

    outputs:
      seed: ${{ steps.generate.outputs.seed }}

    steps:
      - name: Generate seed
        id: generate
        run: echo "seed=$(od -An -N4 -td4 < /dev/urandom | tr -d ' \n')" >> "$GITHUB_OUTPUT"

  fuzz:
    runs-on: ubuntu-latest
    needs: [seed]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: erlang
          - target: javascript
            js_runtime: node
          - target: javascript
            js_runtime: deno
          - target: javascript
            js_runtime: bun

    steps:
      - uses: actions/checkout@v4

      - name: Setup runtimes
        uses: ./.github/actions/setup
        with:
          js_runtime: ${{ matrix.js_runtime }}

      - name: Download dependencies
        run: gleam deps download

      - name: Run fuzz test
        timeout-minutes: 5
        run: |
          if [ "${{ matrix.target }}" = "javascript" ]; then
            gleam dev --target javascript --runtime ${{ matrix.js_runtime }} fuzz 100000 ${{ needs.seed.outputs.seed }}
          else
            gleam dev --target erlang fuzz 100000 ${{ needs.seed.outputs.seed }}
          fi
